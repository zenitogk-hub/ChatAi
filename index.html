<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI Workspace Dual & Multimodal</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    /* Базовые переменные для тем */
    :root {
      --bg-main: #111827; /* gray-900 */
      --bg-sec: #1f2937; /* gray-800 */
      --bg-third: #374151; /* gray-700 */
      --text-main: #f3f4f6; /* gray-100 */
      --text-sec: #9ca3af; /* gray-400 */
      --border-color: #374151; /* gray-700 */
      --code-bg: #1f2937;
    }
    
    body.light-theme {
      --bg-main: #f3f4f6; /* gray-100 */
      --bg-sec: #ffffff; /* white */
      --bg-third: #e5e7eb; /* gray-200 */
      --text-main: #111827; /* gray-900 */
      --text-sec: #4b5563; /* gray-600 */
      --border-color: #d1d5db; /* gray-300 */
      --code-bg: #e5e7eb;
    }

    body { background-color: var(--bg-main); color: var(--text-main); transition: all 0.3s; }
    .theme-bg-sec { background-color: var(--bg-sec); border-color: var(--border-color); }
    .theme-bg-third { background-color: var(--bg-third); border-color: var(--border-color); color: var(--text-main); }
    .theme-text-sec { color: var(--text-sec); }
    .theme-border { border-color: var(--border-color); }

    .chat-container { height: calc(100vh - 180px); }
    .markdown-body pre { background: var(--code-bg); padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
    .markdown-body code { font-family: monospace; background: rgba(156, 163, 175, 0.2); padding: 0.2rem 0.4rem; border-radius: 0.25rem; color: #ef4444; }
    .markdown-body pre code { color: inherit; background: transparent; padding: 0; }
    
    /* Модальное окно настроек */
    #settingsModal { display: none; }
    #settingsModal.active { display: flex; }
  </style>
</head>
<body class="font-sans">

  <header class="theme-bg-sec border-b theme-border p-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
      <h1 class="text-xl font-bold text-blue-500 flex items-center gap-2">🚀 AI Hub <span class="text-xs theme-text-sec">v2.1</span></h1>
      
      <div class="flex items-center flex-wrap gap-4">
        
        <div class="flex flex-col">
          <span class="text-xs theme-text-sec font-bold mb-0.5">Категория</span>
          <select id="categoryFilter" class="theme-bg-third text-sm rounded-lg p-2 border focus:outline-none focus:border-blue-500 w-32">
            <option value="all">Все модели</option>
          </select>
        </div>

        <div class="flex flex-col">
          <span class="text-xs theme-text-sec font-bold mb-0.5">Модель 1 (Основная)</span>
          <select id="modelSelect1" class="theme-bg-third text-sm rounded-lg p-2 border focus:outline-none focus:border-blue-500 w-64"></select>
        </div>

        <label class="flex items-center gap-2 theme-bg-third px-3 py-2 rounded-lg cursor-pointer hover:opacity-80 transition mt-4">
          <input type="checkbox" id="compareMode" class="form-checkbox text-blue-500 rounded">
          <span class="text-sm font-medium">🌓 Сравнение</span>
        </label>

        <div id="model2Wrapper" class="flex flex-col hidden">
          <span class="text-xs theme-text-sec font-bold mb-0.5">Модель 2</span>
          <select id="modelSelect2" class="theme-bg-third text-sm rounded-lg p-2 border focus:outline-none focus:border-green-500 w-64"></select>
        </div>

        <button id="settingsBtn" class="theme-bg-third p-2 rounded-lg hover:opacity-80 transition mt-4 border theme-border" title="Настройки">
          ⚙️
        </button>
      </div>
    </div>
  </header>

  <div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center">
    <div class="theme-bg-sec p-6 rounded-xl shadow-lg w-96 border theme-border">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold">Настройки</h2>
        <button id="closeSettings" class="text-red-400 font-bold text-xl">&times;</button>
      </div>
      <div class="space-y-4">
        <button id="refreshModelsBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg transition">
          🔄 Обновить список моделей
        </button>
        <button id="exportChatBtn" class="w-full bg-green-600 hover:bg-green-500 text-white py-2 rounded-lg transition">
          💾 Экспорт чата (Markdown)
        </button>
        <button id="themeToggleBtn" class="w-full theme-bg-third py-2 rounded-lg transition border theme-border">
          🌗 Переключить тему
        </button>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto p-4">
    <div id="chatWindow" class="chat-container overflow-y-auto space-y-4 pr-2 flex gap-4 items-start">
      <div id="singleTrack" class="w-full space-y-4"></div>
      
      <div id="compareTrack1" class="w-1/2 space-y-4 hidden border-r theme-border pr-4">
        <div class="text-center text-xs font-bold text-blue-500 tracking-wider uppercase border-b theme-border pb-2 mb-2">Модель 1</div>
      </div>
      <div id="compareTrack2" class="w-1/2 space-y-4 hidden pl-2">
        <div class="text-center text-xs font-bold text-green-500 tracking-wider uppercase border-b theme-border pb-2 mb-2">Модель 2</div>
      </div>
    </div>
  </main>

  <footer class="fixed bottom-0 left-0 w-full theme-bg-sec border-t theme-border p-4">
    <div class="max-w-4xl mx-auto">
      <div id="filePreviewContainer" class="flex flex-wrap gap-2 mb-2"></div>
      <div class="flex items-center gap-2">
        <label class="theme-bg-third hover:opacity-80 p-3 rounded-xl cursor-pointer transition flex items-center justify-center shadow" title="Прикрепить файл (Только для Gemini)">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
          </svg>
          <input type="file" id="fileInput" class="hidden" multiple>
        </label>
        <textarea id="promptInput" rows="1" class="flex-1 theme-bg-third rounded-xl p-3 border focus:outline-none focus:border-blue-500 resize-none shadow" placeholder="Напишите запрос... (Файлы поддерживают только модели Gemini)"></textarea>
        <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-3 rounded-xl transition shadow flex items-center justify-center">
          Отправить
        </button>
      </div>
    </div>
  </footer>

  <script>
    // === ВСТАВЬ СЮДА СВОЙ URL ===
    const WORKER_URL = 'https://your-worker.your-subdomain.workers.dev';

    let attachedFiles = [];
    let chatHistory = [];
    let allModelsData = []; // Сохраняем все модели для фильтрации

    const compareModeCheck = document.getElementById('compareMode');
    const model2Wrapper = document.getElementById('model2Wrapper');
    const singleTrack = document.getElementById('singleTrack');
    const compareTrack1 = document.getElementById('compareTrack1');
    const compareTrack2 = document.getElementById('compareTrack2');
    const modelSelect1 = document.getElementById('modelSelect1');
    const modelSelect2 = document.getElementById('modelSelect2');
    const categoryFilter = document.getElementById('categoryFilter');
    const fileInput = document.getElementById('fileInput');
    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatWindow = document.getElementById('chatWindow');

    // Элементы настроек
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettings = document.getElementById('closeSettings');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const exportChatBtn = document.getElementById('exportChatBtn');
    const refreshModelsBtn = document.getElementById('refreshModelsBtn');

    // --- Настройки и UI ---
    settingsBtn.onclick = () => settingsModal.classList.add('active');
    closeSettings.onclick = () => settingsModal.classList.remove('active');
    window.onclick = (e) => { if(e.target === settingsModal) settingsModal.classList.remove('active'); };

    themeToggleBtn.onclick = () => {
      document.body.classList.toggle('light-theme');
      const isLight = document.body.classList.contains('light-theme');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    };

    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

    exportChatBtn.onclick = () => {
      if (chatHistory.length === 0) return alert('История чата пуста!');
      let mdContent = "# История чата (AI Hub)\n\n";
      chatHistory.forEach(msg => {
        const role = msg.role === 'user' ? '👤 **Вы**' : '🤖 **AI**';
        mdContent += `${role}:\n${msg.content}\n\n---\n\n`;
      });
      const blob = new Blob([mdContent], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `chat_export_${new Date().toISOString().slice(0,10)}.md`;
      a.click();
      settingsModal.classList.remove('active');
    };

    refreshModelsBtn.onclick = () => {
      loadModels();
      settingsModal.classList.remove('active');
    };

    // --- Логика Моделей и Фильтрации ---
    async function loadModels() {
      try {
        const res = await fetch(`${WORKER_URL}/v1/models`);
        const data = await res.json();
        allModelsData = data.models || [];
        
        // Собираем уникальные категории из воркера
        const categories = [...new Set(allModelsData.map(m => m.category).filter(Boolean))];
        categoryFilter.innerHTML = '<option value="all">Все модели</option>';
        categories.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat;
          const names = { 'fast': 'Быстрые', 'standard': 'Стандартные', 'reasoning': 'Рассуждающие', 'latest': 'Новейшие', 'stable': 'Стабильные', 'qwen': 'Qwen' };
          opt.textContent = names[cat] || cat;
          categoryFilter.appendChild(opt);
        });

        renderModelSelects('all');
      } catch (e) {
        alert('Ошибка подключения к воркеру. Проверьте WORKER_URL.');
      }
    }

    function renderModelSelects(filterCategory) {
      const filtered = filterCategory === 'all' 
        ? allModelsData 
        : allModelsData.filter(m => m.category === filterCategory);

      [modelSelect1, modelSelect2].forEach((select, idx) => {
        const currentVal = select.value;
        select.innerHTML = '';
        filtered.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.label;
          select.appendChild(opt);
        });
        // Пытаемся восстановить выбор или выбираем разные модели для 1 и 2
        if(currentVal && filtered.find(m => m.id === currentVal)) {
          select.value = currentVal;
        } else if (idx === 1 && select.options.length > 1) {
          select.selectedIndex = 1;
        }
      });
    }

    categoryFilter.addEventListener('change', (e) => renderModelSelects(e.target.value));

    // --- Режимы и Файлы ---
    compareModeCheck.addEventListener('change', (e) => {
      model2Wrapper.classList.toggle('hidden', !e.target.checked);
      singleTrack.classList.toggle('hidden', e.target.checked);
      compareTrack1.classList.toggle('hidden', !e.target.checked);
      compareTrack2.classList.toggle('hidden', !e.target.checked);
      
      chatWindow.innerHTML = '';
      if(e.target.checked) {
        chatWindow.appendChild(compareTrack1);
        chatWindow.appendChild(compareTrack2);
      } else {
        chatWindow.appendChild(singleTrack);
      }
    });

    fileInput.addEventListener('change', async (e) => {
      for (let file of e.target.files) {
        const base64Data = await convertToBase64(file);
        attachedFiles.push({ name: file.name, type: file.type, base64: base64Data.split(',')[1] });
        renderFilePreviews();
      }
      fileInput.value = '';
    });

    function convertToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    function renderFilePreviews() {
      filePreviewContainer.innerHTML = '';
      attachedFiles.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = 'theme-bg-third text-xs px-3 py-1.5 rounded-lg flex items-center gap-2 border theme-border';
        div.innerHTML = `<span class="truncate max-w-xs">📎 ${file.name}</span>
                         <button onclick="removeFile(${index})" class="text-red-400 hover:text-red-500 font-bold ml-1">×</button>`;
        filePreviewContainer.appendChild(div);
      });
    }

    window.removeFile = function(index) {
      attachedFiles.splice(index, 1);
      renderFilePreviews();
    }

    // --- Отправка сообщений ---
    sendBtn.addEventListener('click', async () => {
      const text = promptInput.value.trim();
      if (!text && attachedFiles.length === 0) return;

      promptInput.value = '';
      promptInput.style.height = 'auto';

      const parts = [];
      if (text) parts.push({ text: text });
      attachedFiles.forEach(f => parts.push({ inlineData: { mimeType: f.type, data: f.base64 } }));

      const userMessage = { role: 'user', parts: parts, content: text };
      chatHistory.push(userMessage);

      renderUserMessage(text, [...attachedFiles]);
      attachedFiles = [];
      renderFilePreviews();

      if (compareModeCheck.checked) {
        sendToModel(modelSelect1.value, compareTrack1, 'blue');
        sendToModel(modelSelect2.value, compareTrack2, 'green');
      } else {
        sendToModel(modelSelect1.value, singleTrack, 'blue');
      }
    });

    function renderUserMessage(text, files) {
      const fileNames = files.map(f => `<span class="text-blue-500 block text-xs mt-1">📎 Файл отправлен: ${f.name}</span>`).join('');
      const htmlContent = `
        <div class="flex justify-end mb-4">
          <div class="bg-blue-100 dark:bg-blue-900 border border-blue-200 dark:border-blue-700 rounded-2xl px-4 py-3 max-w-3xl shadow text-gray-900 dark:text-gray-100" style="background-color: rgba(59, 130, 246, 0.1);">
            <div class="text-xs text-blue-500 font-bold mb-1">Вы:</div>
            <div class="whitespace-pre-wrap">${text || '(Файл без текста)'}</div>
            ${fileNames}
          </div>
        </div>`;
      
      if (compareModeCheck.checked) {
        compareTrack1.insertAdjacentHTML('beforeend', htmlContent);
        compareTrack2.insertAdjacentHTML('beforeend', htmlContent);
      } else {
        singleTrack.insertAdjacentHTML('beforeend', htmlContent);
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendToModel(modelId, targetTrack, colorClass) {
      const blockId = 'ai-' + Math.random().toString(36).substr(2, 9);
      const bColor = colorClass === 'blue' ? 'border-blue-500' : 'border-green-500';
      const tColor = colorClass === 'blue' ? 'text-blue-500' : 'text-green-500';
      
      const aiBlockHtml = `
        <div id="${blockId}" class="flex justify-start mb-4 w-full">
          <div class="theme-bg-sec border-l-4 ${bColor} rounded-xl px-4 py-3 w-full shadow markdown-body theme-border">
            <div class="text-xs ${tColor} font-bold mb-1">${modelId}:</div>
            <div class="loading text-sm theme-text-sec animate-pulse">Думает...</div>
          </div>
        </div>`;
      targetTrack.insertAdjacentHTML('beforeend', aiBlockHtml);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      try {
        const res = await fetch(`${WORKER_URL}/v1/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: modelId, messages: chatHistory })
        });
        const data = await res.json();
        
        const container = document.getElementById(blockId).querySelector('.markdown-body');
        container.querySelector('.loading').remove();
        
        if (data.error) {
          container.insertAdjacentHTML('beforeend', `<div class="text-red-500 font-medium">⚠️ Ошибка: ${data.error}</div>`);
        } else {
          container.insertAdjacentHTML('beforeend', `<div>${marked.parse(data.text)}</div>`);
          if (!compareModeCheck.checked || targetTrack === compareTrack1) {
            chatHistory.push({ role: 'assistant', content: data.text });
          }
        }
      } catch (e) {
        const container = document.getElementById(blockId).querySelector('.markdown-body');
        container.querySelector('.loading').remove();
        container.insertAdjacentHTML('beforeend', `<div class="text-red-500 font-medium">⚠️ Ошибка связи с воркером</div>`);
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    promptInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    loadModels();
  </script>
</body>
</html>
