<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💬 Чат-АИ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      background: #16213e;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #0f3460;
    }
    .header h1 { font-size: 24px; }
    .header-controls button {
      margin-left: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #0f3460;
      color: #fff;
      font-size: 14px;
    }
    .header-controls button:hover { background: #e94560; }
    
    /* Filters */
    .filters {
      background: #16213e;
      padding: 15px 20px;
      border-bottom: 1px solid #0f3460;
    }
    .filter-group {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group label {
      font-size: 13px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-group input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
    }
    .filter-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 12px;
      border: 1px solid #0f3460;
      border-radius: 20px;
      background: #1a1a2e;
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: #e94560;
      color: #fff;
      border-color: #e94560;
    }
    .filter-btn:hover:not(.active) {
      background: #0f3460;
      color: #fff;
    }
    
    /* Legend */
    .legend {
      display: flex;
      gap: 15px;
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-fast { background: #f39c12; color: #000; }
    .badge-lite { background: #3498db; color: #fff; }
    .badge-pro { background: #9b59b6; color: #fff; }
    .badge-std { background: #7f8c8d; color: #fff; }
    .badge-preview { background: #e67e22; color: #fff; }
    .badge-latest { background: #2ecc71; color: #000; }
    
    /* Chat list */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .chat-item {
      background: #16213e;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .chat-item:hover {
      transform: translateX(5px);
      border-color: #0f3460;
    }
    .chat-item.active {
      border-color: #e94560;
      background: #0f3460;
    }
    .chat-item h3 {
      font-size: 16px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-item .meta {
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-item .badges {
      display: flex;
      gap: 5px;
    }
    
    /* Model badges */
    .model-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .model-badge.free { background: #27ae60; color: #fff; }
    .model-badge.paid { background: #e74c3c; color: #fff; }
    .model-badge.fast { background: #f39c12; color: #000; }
    .model-badge.turbo { background: #e94560; color: #fff; }
    .model-badge.preview { background: #e67e22; color: #fff; }
    
    /* Provider tags */
    .provider-gemini { color: #3498db; }
    .provider-openai { color: #2ecc71; }
    .provider-groq { color: #9b59b6; }
    
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #888;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: #e94560; }
  </style>
</head>
<body>
  <div class="header">
    <h1>💬 Чат-АИ</h1>
    <div class="header-controls">
      <button onclick="newChat()">🌙 Новый чат</button>
      <button onclick="toggleSettings()">⚙️</button>
    </div>
  </div>
  
  <div class="filters">
    <div class="filter-group">
      <label>
        <input type="checkbox" id="filter-free" checked onchange="applyFilters()">
        🆓 Бесплатные
      </label>
      <label>
        <input type="checkbox" id="filter-paid" onchange="applyFilters()">
        💰 Платные
      </label>
      <label>
        <input type="checkbox" id="filter-fast" onchange="applyFilters()">
        ⚡ Быстрые
      </label>
    </div>
    
    <div class="filter-group">
      <span>Провайдер:</span>
      <div class="filter-buttons">
        <button class="filter-btn active" data-provider="all" onclick="setProvider('all')">Все</button>
        <button class="filter-btn" data-provider="gemini" onclick="setProvider('gemini')">Gemini</button>
        <button class="filter-btn" data-provider="groq" onclick="setProvider('groq')">Groq</button>
        <button class="filter-btn" data-provider="openai" onclick="setProvider('openai')">OpenAI</button>
      </div>
    </div>
    
    <div class="filter-group">
      <span>Сортировка:</span>
      <div class="filter-buttons">
        <button class="filter-btn active" data-sort="priority" onclick="setSort('priority')">🔥 По мощности</button>
        <button class="filter-btn" data-sort="newest" onclick="setSort('newest')">✨ По новизне</button>
        <button class="filter-btn" data-sort="speed" onclick="setSort('speed')">⚡ По скорости</button>
        <button class="filter-btn" data-sort="name" onclick="setSort('name')">📝 По имени</button>
      </div>
    </div>
    
    <div class="legend">
      <div class="legend-item"><span class="badge badge-fast">⚡ FAST</span> Быстрая</div>
      <div class="legend-item"><span class="badge badge-lite">LITE</span> Облегченная</div>
      <div class="legend-item"><span class="badge badge-pro">💰 PRO</span> Платная</div>
      <div class="legend-item"><span class="badge badge-preview">🔬 PREVIEW</span> Тестовая</div>
      <div class="legend-item"><span class="badge badge-latest">✨ LATEST</span> Последняя</div>
    </div>
  </div>
  
  <div class="chat-list" id="chatList">
    <div class="empty-state">
      <h2>🚀 Выбери модель</h2>
      <p>Используй фильтры выше чтобы найти подходящую</p>
    </div>
  </div>
  
  <div id="settings" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#16213e; padding:30px; border-radius:15px; z-index:1000; min-width:400px;">
    <h2 style="margin-bottom:20px;">⚙️ Настройки</h2>
    <label style="display:block; margin-bottom:15px;">
      <div style="margin-bottom:5px; color:#aaa;">URL Cloudflare Worker:</div>
      <input type="text" id="workerUrl" style="width:100%; padding:10px; border-radius:6px; border:1px solid #0f3460; background:#1a1a2e; color:#fff;" placeholder="https://your-worker.workers.dev">
    </label>
    <button onclick="saveSettings()" style="padding:10px 20px; background:#e94560; color:#fff; border:none; border-radius:6px; cursor:pointer;">Сохранить</button>
    <button onclick="toggleSettings()" style="padding:10px 20px; background:#0f3460; color:#fff; border:none; border-radius:6px; cursor:pointer; margin-left:10px;">Закрыть</button>
  </div>
  
  <div id="overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:999;" onclick="toggleSettings()"></div>

  <script>
    let currentFilter = { provider: 'all', sort: 'priority', free: true, paid: false, fast: false };
    let models = [];
    
    // Загрузка моделей
    async function loadModels() {
      try {
        const workerUrl = localStorage.getItem('workerUrl');
        if (!workerUrl) {
          document.getElementById('chatList').innerHTML = `
            <div class="empty-state">
              <h2>⚙️ Сначала настройте</h2>
              <p>Нажмите ⚙️ и укажите URL Cloudflare Worker</p>
            </div>
          `;
          return;
        }
        
        const res = await fetch(workerUrl + '/v1/models');
        const data = await res.json();
        models = data.models || [];
        renderModels();
      } catch (e) {
        console.error('Error loading models:', e);
      }
    }
    
    // Рендер моделей
    function renderModels() {
      const list = document.getElementById('chatList');
      let filtered = models.filter(m => {
        // Фильтр по бесплатности/платности
        if (currentFilter.free && !m.paidOnly && currentFilter.paid && m.paidOnly) return true;
        if (currentFilter.free && !m.paidOnly && !currentFilter.paid && m.paidOnly) return true;
        if (!currentFilter.free && !m.paidOnly && currentFilter.paid && m.paidOnly) return true;
        if (!currentFilter.free && !m.paidOnly && !currentFilter.paid && m.paidOnly) return false;
        
        // Фильтр по провайдеру
        if (currentFilter.provider !== 'all' && m.provider !== currentFilter.provider) return false;
        
        // Фильтр быстрых
        if (currentFilter.fast && !m.label.includes('FAST') && !m.label.includes('LITE')) return false;
        
        return true;
      });
      
      // Сортировка
      filtered.sort((a, b) => {
        if (currentFilter.sort === 'priority') return (b.priority || 0) - (a.priority || 0);
        if (currentFilter.sort === 'newest') return (b.major || 0) - (a.major || 0) || (b.minor || 0) - (a.minor || 0);
        if (currentFilter.sort === 'speed') {
          const aSpeed = a.label.includes('LITE') ? 3 : a.label.includes('FAST') ? 2 : 1;
          const bSpeed = b.label.includes('LITE') ? 3 : b.label.includes('FAST') ? 2 : 1;
          return bSpeed - aSpeed;
        }
        if (currentFilter.sort === 'name') return (a.label || '').localeCompare(b.label || '');
        return 0;
      });
      
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><h2>😕 Ничего не найдено</h2><p>Попробуйте изменить фильтры</p></div>';
        return;
      }
      
      list.innerHTML = filtered.map(m => {
        const badges = [];
        if (m.paidOnly) badges.push('<span class="model-badge paid">💰 Платная</span>');
        else if (m.label.includes('LITE')) badges.push('<span class="model-badge fast">⚡ LITE</span>');
        else if (m.label.includes('FAST')) badges.push('<span class="model-badge fast">⚡ FAST</span>');
        if (m.label.includes('PREVIEW')) badges.push('<span class="model-badge preview">🔬 Preview</span>');
        if (m.label.includes('LATEST')) badges.push('<span class="model-badge turbo">✨ Latest</span>');
        
        const providerClass = `provider-${m.provider}`;
        const providerName = m.provider === 'gemini' ? '🔮 Gemini' : m.provider === 'openai' ? '🤖 OpenAI' : '⚡ Groq';
        
        return `
          <div class="chat-item" onclick="selectModel('${m.id}')">
            <h3>
              <span class="${providerClass}">${providerName}</span>
              ${badges.join(' ')}
            </h3>
            <div style="margin-top:8px; font-size:14px;">${m.label || m.id}</div>
            <div class="meta">
              <span>ID: ${m.id}</span>
              ${m.reason ? `<span>⚠️ ${m.reason}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }
    
    function applyFilters() {
      currentFilter.free = document.getElementById('filter-free').checked;
      currentFilter.paid = document.getElementById('filter-paid').checked;
      currentFilter.fast = document.getElementById('filter-fast').checked;
      renderModels();
    }
    
    function setProvider(provider) {
      currentFilter.provider = provider;
      document.querySelectorAll('.filter-buttons button').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.provider === provider) btn.classList.add('active');
      });
      renderModels();
    }
    
    function setSort(sort) {
      currentFilter.sort = sort;
      document.querySelectorAll('.filter-buttons button').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.sort === sort) btn.classList.add('active');
      });
      renderModels();
    }
    
    function selectModel(modelId) {
      localStorage.setItem('selectedModel', modelId);
      alert('Выбрана модель: ' + modelId);
      // Здесь можно добавить переключение на чат
    }
    
    function newChat() {
      // Создание нового чата
    }
    
    function toggleSettings() {
      const settings = document.getElementById('settings');
      const overlay = document.getElementById('overlay');
      if (settings.style.display === 'none') {
        document.getElementById('workerUrl').value = localStorage.getItem('workerUrl') || '';
        settings.style.display = 'block';
        overlay.style.display = 'block';
      } else {
        settings.style.display = 'none';
        overlay.style.display = 'none';
      }
    }
    
    function saveSettings() {
      localStorage.setItem('workerUrl', document.getElementById('workerUrl').value);
      toggleSettings();
      loadModels();
    }
    
    // Инициализация
    loadModels();
  </script>
</body>
</html>
