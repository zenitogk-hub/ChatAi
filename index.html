<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>Gemini Workspace Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-main: #131314;
      --bg-sidebar: #1e1f20;
      --bg-card: #282a2c;
      --text-main: #e3e3e3;
      --text-sec: #c4c7c5;
      --border-color: #444746;
      --code-bg: #1e1f20;
      --user-msg-bg: #2b2a33;
    }
    
    body.light-theme {
      --bg-main: #f0f4f9; 
      --bg-sidebar: #f8fafd;
      --bg-card: #ffffff;
      --text-main: #1f1f1f;
      --text-sec: #474747;
      --border-color: #c4c7c5;
      --code-bg: #e9eef6;
      --user-msg-bg: #e3e3e3;
    }

    body { 
      height: 100vh;
      height: 100dvh;
      background-color: var(--bg-main); 
      color: var(--text-main); 
      transition: all 0.2s ease; 
    }
    
    .theme-sidebar { background-color: var(--bg-sidebar); border-color: var(--border-color); }
    .theme-card { background-color: var(--bg-card); border-color: var(--border-color); }
    .theme-text-sec { color: var(--text-sec); }
    .theme-border { border-color: var(--border-color); }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .markdown-body pre { background: var(--code-bg); padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 0.5rem 0; border: 1px solid var(--border-color); }
    .markdown-body code { font-family: monospace; background: rgba(148, 163, 184, 0.15); padding: 0.2rem 0.4rem; border-radius: 0.25rem; color: #ff6b6b; }
    body.light-theme .markdown-body code { color: #d946ef; }
    .markdown-body pre code { color: inherit; background: transparent; padding: 0; }
    
    .badge { font-size: 0.65rem; font-weight: 600; padding: 0.1rem 0.4rem; border-radius: 0.25rem; }
    
    /* Сдвиг сайдбара на десктопе при скрытии */
    @media (min-width: 768px) {
      .sidebar-desktop-hidden {
        margin-left: -16rem !important;
        opacity: 0;
        pointer-events: none;
      }
    }
  </style>
</head>
<body class="font-sans antialiased flex overflow-hidden">

  <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 theme-sidebar border-r z-40 flex flex-col transition-all duration-300 transform -translate-x-full md:translate-x-0 md:relative md:shrink-0 shadow-xl">
    <div class="p-4">
      <button id="newChatBtn" class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-full text-sm font-medium transition shadow-sm">
        ➕ Новый чат
      </button>
    </div>

    <div class="px-4 mb-2">
      <span class="text-xs theme-text-sec font-bold block mb-1.5 uppercase tracking-wider px-1">Фильтр моделей:</span>
      <div class="grid grid-cols-2 gap-1 text-center">
        <button class="filter-chip bg-blue-600 text-white text-xs py-1.5 rounded-lg font-medium transition" data-filter="all">Все</button>
        <button class="filter-chip theme-card text-xs py-1.5 rounded-lg font-medium border theme-border hover:bg-gray-700 transition" data-filter="files">📁 Файлы</button>
        <button class="filter-chip theme-card text-xs py-1.5 rounded-lg font-medium border theme-border hover:bg-gray-700 transition" data-filter="speed">⚡ Быстрые</button>
        <button class="filter-chip theme-card text-xs py-1.5 rounded-lg font-medium border theme-border hover:bg-gray-700 transition" data-filter="power">🧠 Мощные</button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto no-scrollbar px-2 space-y-1" id="chatSessionsContainer"></div>

    <div class="p-4 border-t theme-border space-y-2 text-xs font-medium flex-none">
      <button id="themeToggleBtn" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-gray-700 hover:text-white transition">
        🌗 Сменить тему
      </button>
      <button id="exportChatBtn" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-gray-700 hover:text-white transition">
        💾 Экспорт диалога (.md)
      </button>
      <button id="clearAllBtn" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl text-red-400 hover:bg-red-900/30 transition">
        🗑️ Очистить историю
      </button>
    </div>
  </aside>

  <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden"></div>

  <main class="flex-1 flex flex-col h-full overflow-hidden relative">
    
    <header class="theme-card border-b theme-border p-3 flex items-center justify-between gap-4 shadow-sm z-10 flex-none">
      <div class="flex items-center gap-3 shrink-0">
        <button id="burgerBtn" class="p-2 rounded-lg hover:bg-gray-700 transition focus:outline-none text-xl" title="Переключить боковое меню">
          ☰
        </button>
        <h1 class="text-md font-bold tracking-tight hidden sm:block">Workspace <span class="text-blue-500 font-mono text-xs">v4.0</span></h1>
      </div>

      <div class="flex items-center gap-4 max-w-full overflow-x-auto no-scrollbar shrink-0">
        <div class="flex flex-col shrink-0 min-w-[150px] sm:min-w-[200px]">
          <select id="modelSelect1" class="theme-card text-xs rounded-xl p-2.5 border focus:outline-none focus:border-blue-500 font-mono w-full h-10 cursor-pointer"></select>
          <div id="capabilities1" class="flex gap-1 mt-1 min-h-[14px]"></div>
        </div>

        <label class="flex items-center gap-1.5 theme-card px-3 py-2 rounded-xl cursor-pointer hover:opacity-90 transition border theme-border text-xs font-bold shrink-0 h-10 select-none" title="Оставить только последние версии моделей">
          <input type="checkbox" id="hideOldMode" class="form-checkbox text-blue-500 rounded scale-90" checked>
          <span>Только новые</span>
        </label>

        <label class="flex items-center gap-1.5 theme-card px-3 py-2 rounded-xl cursor-pointer hover:opacity-90 transition border theme-border text-xs font-bold shrink-0 h-10 select-none">
          <input type="checkbox" id="compareMode" class="form-checkbox text-blue-500 rounded scale-90">
          <span>Сравнение</span>
        </label>

        <div id="model2Wrapper" class="flex flex-col shrink-0 min-w-[150px] sm:min-w-[200px] hidden">
          <select id="modelSelect2" class="theme-card text-xs rounded-xl p-2.5 border focus:outline-none focus:border-green-500 font-mono w-full h-10 cursor-pointer"></select>
          <div id="capabilities2" class="flex gap-1 mt-1 min-h-[14px]"></div>
        </div>
      </div>
    </header>

    <div id="chatWindow" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
      <div id="layoutWrapper" class="max-w-3xl mx-auto w-full space-y-6"></div>
    </div>

    <div class="p-4 w-full max-w-3xl mx-auto flex-none pb-6">
      <div id="filePreviewContainer" class="flex flex-wrap gap-2 mb-2 px-2"></div>
      
      <div class="theme-card border theme-border rounded-3xl p-2 flex items-end gap-2 shadow-xl relative">
        <label class="p-3 rounded-full hover:bg-gray-500/30 bg-gray-500/10 cursor-pointer transition flex items-center justify-center text-blue-400 shrink-0 mb-0.5" title="Прикрепить схемы/логи">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
          </svg>
          <input type="file" id="fileInput" class="hidden" multiple>
        </label>

        <textarea id="promptInput" rows="1" class="flex-1 bg-transparent border-0 focus:ring-0 focus:outline-none text-sm p-2.5 resize-none overflow-y-auto max-h-40" placeholder="Введите запрос к ИИ..."></textarea>
        
        <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-full transition flex items-center justify-center shadow-md shrink-0 mb-0.5" title="Отправить запрос">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
          </svg>
        </button>
      </div>
    </div>

  </main>

  <script>
    const WORKER_URL = 'https://chat-ai-proxy.zenitogk.workers.dev';

    let chats = JSON.parse(localStorage.getItem('gemini_hub_chats')) || {};
    let currentChatId = localStorage.getItem('gemini_hub_current_id') || '';
    
    let attachedFiles = [];
    let allModelsData = [];
    let currentFilter = 'all';
    let activeLoaders = {}; 

    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const burgerBtn = document.getElementById('burgerBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const chatSessionsContainer = document.getElementById('chatSessionsContainer');
    
    const compareModeCheck = document.getElementById('compareMode');
    const hideOldModeCheck = document.getElementById('hideOldMode');
    const model2Wrapper = document.getElementById('model2Wrapper');
    const layoutWrapper = document.getElementById('layoutWrapper');
    const modelSelect1 = document.getElementById('modelSelect1');
    const modelSelect2 = document.getElementById('modelSelect2');
    const capabilities1 = document.getElementById('capabilities1');
    const capabilities2 = document.getElementById('capabilities2');
    
    const fileInput = document.getElementById('fileInput');
    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatWindow = document.getElementById('chatWindow');

    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const exportChatBtn = document.getElementById('exportChatBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // Логика управления сайдбаром для ПК и Мобильных
    burgerBtn.onclick = () => { 
      if (window.innerWidth < 768) {
        sidebar.classList.toggle('-translate-x-full');
        sidebarOverlay.classList.toggle('hidden');
      } else {
        sidebar.classList.toggle('sidebar-desktop-hidden');
      }
    };
    
    sidebarOverlay.onclick = () => { 
      sidebar.classList.add('-translate-x-full'); 
      sidebarOverlay.classList.add('hidden'); 
    };

    themeToggleBtn.onclick = () => {
      document.body.classList.toggle('light-theme');
      localStorage.setItem('gemini_hub_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    };
    if(localStorage.getItem('gemini_hub_theme') === 'light') document.body.classList.add('light-theme');

    hideOldModeCheck.checked = localStorage.getItem('gemini_hub_hide_old') !== 'false';

    hideOldModeCheck.onchange = () => {
      localStorage.setItem('gemini_hub_hide_old', hideOldModeCheck.checked);
      applyFiltering();
    };

    newChatBtn.onclick = () => { createNewSession(); };

    clearAllBtn.onclick = () => {
      if(confirm('Удалить все чаты безвозвратно?')) {
        chats = {}; currentChatId = '';
        saveState(); createNewSession();
      }
    };

    exportChatBtn.onclick = () => {
      const activeHistory = chats[currentChatId]?.history || [];
      if (!activeHistory.length) return alert('История текущего чата пуста.');
      let md = `# Экспорт сессии чата\n\n`;
      activeHistory.forEach(msg => {
        md += `### ${msg.role === 'user' ? 'Вы' : `ИИ (${msg.modelId})`}:\n${msg.content}\n\n`;
      });
      const blob = new Blob([md], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `chat_export_${currentChatId.slice(0,6)}.md`;
      a.click();
    };

    function createNewSession() {
      const id = 'chat_' + Date.now();
      chats[id] = { title: 'Новый диалог', history: [] };
      currentChatId = id;
      saveState();
      renderSidebarSessions();
      renderActiveChat();
      if(window.innerWidth < 768) { sidebar.classList.add('-translate-x-full'); sidebarOverlay.classList.add('hidden'); }
    }

    function saveState() {
      localStorage.setItem('gemini_hub_chats', JSON.stringify(chats));
      localStorage.setItem('gemini_hub_current_id', currentChatId);
    }

    function renderSidebarSessions() {
      chatSessionsContainer.innerHTML = '';
      Object.keys(chats).sort((a,b) => b.split('_')[1] - a.split('_')[1]).forEach(id => {
        const isSelected = id === currentChatId;
        const activeClass = isSelected ? 'bg-blue-600/20 text-blue-400 font-medium' : 'hover:bg-gray-500/10';
        
        const div = document.createElement('div');
        div.className = `flex items-center justify-between px-3 py-2.5 mx-2 rounded-xl text-sm cursor-pointer transition ${activeClass}`;
        div.innerHTML = `
          <div class="truncate flex-1 pr-2" onclick="switchSession('${id}')">💬 ${chats[id].title}</div>
          <button onclick="deleteSession('${id}', event)" class="opacity-40 hover:opacity-100 text-red-400 text-xs px-1">✕</button>
        `;
        chatSessionsContainer.appendChild(div);
      });
    }

    window.switchSession = function(id) {
      currentChatId = id;
      saveState();
      renderSidebarSessions();
      renderActiveChat();
      if(window.innerWidth < 768) { sidebar.classList.add('-translate-x-full'); sidebarOverlay.classList.add('hidden'); }
    }

    window.deleteSession = function(id, event) {
      event.stopPropagation();
      delete chats[id];
      if(currentChatId === id) {
        const keys = Object.keys(chats);
        currentChatId = keys.length ? keys[0] : '';
      }
      saveState();
      if(!currentChatId) createNewSession();
      else { renderSidebarSessions(); renderActiveChat(); }
    }

    function getModelFamilyAndVersion(id) {
      const cleanId = id.toLowerCase()
        .replace(/-\d{3}$/, '')           
        .replace(/-preview.*$/, '')       
        .replace(/-\d{2}-\d{2}$/, '');    

      const match = cleanId.match(/^([a-z]+(?:-[a-z]+)*?)-?(\d+(?:\.\d+)?)(?:[-_](.*))?$/);
      
      if (match) {
        const base = match[1];
        const version = parseFloat(match[2]);
        const tail = match[3] || '';
        return { family: `${base}-${tail}`, version: version };
      }
      return null;
    }

    function evaluateCapabilities(modelId) {
      const id = modelId.toLowerCase();
      const isGemini = id.includes('gemini');
      return {
        files: isGemini,
        speed: id.includes('flash') || id.includes('8b') || id.includes('3b') || id.includes('mini'),
        power: id.includes('pro') || id.includes('70b') || id.includes('72b') || id.includes('r1') || id.includes('large')
      };
    }

    function drawCapabilitiesBadges(modelId, targetContainer) {
      targetContainer.innerHTML = ''; if(!modelId) return;
      const caps = evaluateCapabilities(modelId);
      if(caps.files) targetContainer.insertAdjacentHTML('beforeend', '<span class="badge bg-purple-600 text-white">📁 Мультимодальный</span>');
      else targetContainer.insertAdjacentHTML('beforeend', '<span class="badge bg-gray-600 text-gray-300">✍️ Только Текст</span>');
      if(caps.speed) targetContainer.insertAdjacentHTML('beforeend', '<span class="badge bg-amber-500 text-gray-900">⚡ Fast</span>');
      if(caps.power) targetContainer.insertAdjacentHTML('beforeend', '<span class="badge bg-red-600 text-white">🧠 High Logics</span>');
    }

    async function loadModels() {
      try {
        const res = await fetch(`${WORKER_URL}/v1/models`);
        const data = await res.json();
        allModelsData = data.models || [];
        applyFiltering();
      } catch (e) { console.error('Ошибка считывания моделей с прокси.'); }
    }

    function applyFiltering() {
      const isHideOld = hideOldModeCheck.checked;
      let maxVersions = {};

      if (isHideOld) {
        allModelsData.forEach(m => {
          const parsed = getModelFamilyAndVersion(m.id);
          if (parsed) {
            if (!maxVersions[parsed.family] || parsed.version > maxVersions[parsed.family]) {
              maxVersions[parsed.family] = parsed.version;
            }
          }
        });
      }

      const filtered = allModelsData.filter(m => {
        const caps = evaluateCapabilities(m.id);
        if(currentFilter === 'files' && !caps.files) return false;
        if(currentFilter === 'speed' && !caps.speed) return false;
        if(currentFilter === 'power' && !caps.power) return false;

        if (isHideOld) {
          const parsed = getModelFamilyAndVersion(m.id);
          if (parsed && parsed.version < maxVersions[parsed.family]) {
            return false; 
          }
          if (/(-legacy|-older|base$)/i.test(m.id)) {
            return false;
          }
        }
        return true;
      });

      const savedM1 = localStorage.getItem('gemini_hub_model1');
      const savedM2 = localStorage.getItem('gemini_hub_model2');

      [modelSelect1, modelSelect2].forEach((select) => {
        select.innerHTML = '';
        filtered.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id; opt.textContent = m.label || m.id;
          select.appendChild(opt);
        });
      });

      if (savedM1 && filtered.find(m => m.id === savedM1)) {
        modelSelect1.value = savedM1;
      } else if (modelSelect1.options.length > 0) {
        modelSelect1.selectedIndex = 0;
      }

      if (savedM2 && filtered.find(m => m.id === savedM2)) {
        modelSelect2.value = savedM2;
      } else if (modelSelect2.options.length > 1) {
        modelSelect2.selectedIndex = 1;
      } else if (modelSelect2.options.length > 0) {
        modelSelect2.selectedIndex = 0;
      }

      drawCapabilitiesBadges(modelSelect1.value, capabilities1);
      drawCapabilitiesBadges(modelSelect2.value, capabilities2);
    }

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(c => c.className = 'filter-chip theme-card text-xs py-1.5 rounded-lg font-medium border theme-border hover:bg-gray-700 transition');
        this.className = 'filter-chip bg-blue-600 text-white text-xs py-1.5 rounded-lg font-medium';
        currentFilter = this.getAttribute('data-filter');
        applyFiltering();
      });
    });

    modelSelect1.onchange = (e) => {
      localStorage.setItem('gemini_hub_model1', e.target.value);
      drawCapabilitiesBadges(e.target.value, capabilities1);
    };
    
    modelSelect2.onchange = (e) => {
      localStorage.setItem('gemini_hub_model2', e.target.value);
      drawCapabilitiesBadges(e.target.value, capabilities2);
    };

    compareModeCheck.onchange = () => { model2Wrapper.classList.toggle('hidden', !compareModeCheck.checked); renderActiveChat(); };

    function renderActiveChat() {
      layoutWrapper.innerHTML = '';
      const isCompare = compareModeCheck.checked;
      const history = chats[currentChatId]?.history || [];

      if (!isCompare) {
        layoutWrapper.className = "max-w-3xl mx-auto w-full space-y-6";
        history.forEach(msg => {
          layoutWrapper.insertAdjacentHTML('beforeend', createMessageHtml(msg));
        });
        if(activeLoaders['track1']) layoutWrapper.insertAdjacentHTML('beforeend', createLoaderHtml(activeLoaders['track1']));
      } else {
        layoutWrapper.className = "max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-6 items-start";
        
        const track1Col = document.createElement('div'); track1Col.className = "space-y-4 border-b md:border-b-0 md:border-r theme-border pb-6 md:pb-0 md:pr-4";
        track1Col.innerHTML = `<div class="text-center text-xs font-bold text-blue-500 uppercase tracking-widest border-b theme-border pb-2 mb-2">Основная модель</div>`;
        
        const track2Col = document.createElement('div'); track2Col.className = "space-y-4 pt-4 md:pt-0 md:pl-2";
        track2Col.innerHTML = `<div class="text-center text-xs font-bold text-green-500 uppercase tracking-widest border-b theme-border pb-2 mb-2">Параллельная модель</div>`;

        history.forEach(msg => {
          if (msg.role === 'user') {
            const userHtml = createMessageHtml(msg);
            track1Col.insertAdjacentHTML('beforeend', userHtml);
            track2Col.insertAdjacentHTML('beforeend', userHtml);
          } else {
            if(msg.track === 'track2') track2Col.insertAdjacentHTML('beforeend', createMessageHtml(msg));
            else track1Col.insertAdjacentHTML('beforeend', createMessageHtml(msg));
          }
        });

        if(activeLoaders['track1']) track1Col.insertAdjacentHTML('beforeend', createLoaderHtml(activeLoaders['track1']));
        if(activeLoaders['track2']) track2Col.insertAdjacentHTML('beforeend', createLoaderHtml(activeLoaders['track2']));

        layoutWrapper.appendChild(track1Col);
        layoutWrapper.appendChild(track2Col);
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function createMessageHtml(msg) {
      if(msg.role === 'user') {
        const fileBadges = (msg.files || []).map(f => `<span class="text-xs text-blue-400 block font-mono mt-1">📎 Данные файла: ${f.name}</span>`).join('');
        return `
          <div class="flex justify-end w-full">
            <div class="rounded-2xl px-4 py-3 max-w-xl shadow-sm text-sm" style="background-color: var(--user-msg-bg);">
              <div class="text-xs text-blue-400 font-bold mb-1">Вы:</div>
              <div class="whitespace-pre-wrap">${msg.content || '(Вложение)'}</div>
              ${fileBadges}
            </div>
          </div>`;
      } else {
        const isTrack2 = msg.track === 'track2';
        const accentColor = isTrack2 ? 'text-green-400' : 'text-blue-400';
        return `
          <div class="flex justify-start w-full">
            <div class="w-full max-w-full markdown-body">
              <div class="text-xs ${accentColor} font-bold font-mono mb-1">${msg.modelId}:</div>
              <div class="text-sm">${marked.parse(msg.content)}</div>
            </div>
          </div>`;
      }
    }

    function createLoaderHtml(modelId) {
      return `
        <div class="flex justify-start w-full animate-pulse">
          <div class="w-full theme-card rounded-2xl p-4 border theme-border">
            <div class="text-xs theme-text-sec font-mono font-bold mb-1">${modelId}</div>
            <div class="text-xs text-blue-400 flex items-center gap-2">🔄 Вычисление матрицы ответа...</div>
          </div>
        </div>`;
    }

    fileInput.addEventListener('change', async (e) => {
      for (let file of e.target.files) {
        const base64Data = await convertToBase64(file);
        attachedFiles.push({ name: file.name, type: file.type, base64: base64Data.split(',')[1] });
        renderFilePreviews();
      }
      fileInput.value = '';
    });

    function convertToBase64(file) {
      return new Promise((resolve) => {
        const r = new FileReader(); r.readAsDataURL(file);
        r.onload = () => resolve(r.result);
      });
    }

    function renderFilePreviews() {
      filePreviewContainer.innerHTML = '';
      attachedFiles.forEach((f, idx) => {
        const div = document.createElement('div');
        div.className = 'theme-card text-xs px-3 py-1.5 rounded-full flex items-center gap-2 border theme-border font-mono';
        div.innerHTML = `<span>📎 ${f.name}</span><button onclick="removeFile(${idx})" class="text-red-400 font-bold ml-1">×</button>`;
        filePreviewContainer.appendChild(div);
      });
    }

    window.removeFile = function(idx) { attachedFiles.splice(idx, 1); renderFilePreviews(); };

    sendBtn.onclick = async () => {
      const text = promptInput.value.trim();
      if (!text && attachedFiles.length === 0) return;

      promptInput.value = ''; promptInput.style.height = 'auto';

      const currentChat = chats[currentChatId];
      if(currentChat.history.length === 0 && text) {
        currentChat.title = text.slice(0, 24) + (text.length > 24 ? '...' : '');
      }

      currentChat.history.push({ role: 'user', content: text, files: [...attachedFiles] });
      saveState(); renderSidebarSessions();

      const m1 = modelSelect1.value;
      const m2 = modelSelect2.value;
      const isCompare = compareModeCheck.checked;

      activeLoaders['track1'] = m1;
      if(isCompare) activeLoaders['track2'] = m2;

      renderActiveChat();
      attachedFiles = []; renderFilePreviews();

      const tasks = [executeRequest(m1, 'track1')];
      if(isCompare) tasks.push(executeRequest(m2, 'track2'));
      await Promise.all(tasks);
    };

    async function executeRequest(modelId, trackName) {
      try {
        const history = chats[currentChatId].history;
        const formattedMessages = history.map(msg => {
          if (msg.role === 'user') {
            const parts = [];
            if (msg.content) parts.push({ text: msg.content });
            if (msg.files) msg.files.forEach(f => parts.push({ inlineData: { mimeType: f.type, data: f.base64 } }));
            return { role: 'user', parts, content: msg.content };
          }
          return { role: 'assistant', content: msg.content };
        });

        const res = await fetch(`${WORKER_URL}/v1/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: modelId, messages: formattedMessages })
        });
        const data = await res.json();
        
        delete activeLoaders[trackName];

        if (!data.error) {
          chats[currentChatId].history.push({ role: 'assistant', modelId, content: data.text, track: trackName });
          saveState();
        } else {
          alert(`Ошибка ${modelId}: ${data.error}`);
        }
      } catch (e) {
        delete activeLoaders[trackName];
        alert(`Ошибка сети при работе с ${modelId}`);
      }
      renderActiveChat();
    }

    promptInput.addEventListener('input', function() {
      this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
    });

    if(!currentChatId || !chats[currentChatId]) createNewSession();
    loadModels();
    renderSidebarSessions();
    renderActiveChat();
  </script>
</body>
</html>
