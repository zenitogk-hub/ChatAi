<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #ffffff;
  --sidebar-bg: #f7f7f8;
  --border: #e5e5e7;
  --text: #1a1a1a;
  --text-secondary: #6e6e73;
  --hover: #ececee;
  --accent: #615ced;
  --accent-hover: #4f4ce0;
  --msg-user: #f0f0f2;
  --msg-ai: transparent;
  --code-bg: #f5f5f7;
  --shadow: rgba(0,0,0,0.05);
}

[data-theme="dark"] {
  --bg: #1a1a1a;
  --sidebar-bg: #242424;
  --border: #333333;
  --text: #f5f5f7;
  --text-secondary: #a1a1a6;
  --hover: #2d2d2d;
  --accent: #7c7cf5;
  --accent-hover: #615ced;
  --msg-user: #2d2d2d;
  --msg-ai: transparent;
  --code-bg: #2d2d2d;
  --shadow: rgba(0,0,0,0.3);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.new-chat-btn {
  width: 100%;
  padding: 12px 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s;
}

.new-chat-btn:hover { background: var(--accent-hover); }

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.chat-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 4px;
  font-size: 14px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.2s;
}

.chat-item:hover { background: var(--hover); }
.chat-item.active { background: var(--hover); font-weight: 500; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.icon-btn {
  flex: 1;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 12px;
  transition: all 0.2s;
}

.icon-btn:hover { background: var(--hover); color: var(--text); }

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
}

.header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
}

.model-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  min-width: 200px;
}

.theme-toggle {
  padding: 8px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  color: var(--text);
  font-size: 16px;
  transition: all 0.2s;
}

.theme-toggle:hover { background: var(--hover); }

/* Chat area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
}

.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--text-secondary);
}

.welcome h1 {
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.welcome p { font-size: 16px; }

.messages { max-width: 800px; margin: 0 auto; width: 100%; }

.message {
  margin-bottom: 24px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-content {
  padding: 16px 20px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 15px;
}

.message.user .message-content {
  background: var(--msg-user);
  margin-left: 48px;
}

.message.assistant .message-content {
  background: var(--msg-ai);
  margin-right: 48px;
}

.message-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.message.user .avatar { background: var(--accent); color: white; }
.message.assistant .avatar { background: var(--code-bg); color: var(--text); }

/* Markdown */
.message-content pre {
  background: var(--code-bg);
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 12px 0;
}

.message-content code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
}

.message-content pre code { background: transparent; padding: 0; }

.message-content p { margin: 8px 0; }
.message-content ul, .message-content ol { margin: 8px 0; padding-left: 24px; }
.message-content h1, .message-content h2, .message-content h3 { margin: 16px 0 8px; }

/* Input */
.input-area {
  padding: 16px 24px 24px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}

.input-container {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
}

.input-box {
  width: 100%;
  padding: 16px 56px 16px 20px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  resize: none;
  min-height: 52px;
  max-height: 200px;
  transition: border-color 0.2s;
}

.input-box:focus { outline: none; border-color: var(--accent); }

.send-btn {
  position: absolute;
  right: 12px;
  bottom: 12px;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.loading { display: inline-block; }
.loading::after {
  content: '...';
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}

/* Mobile */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: block !important; }
}

.menu-btn {
  display: none;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  color: var(--text);
  font-size: 18px;
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="newChat()">
        <span>+</span> Новый чат
      </button>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <button class="icon-btn" onclick="exportChat()">📥 Экспорт</button>
      <button class="icon-btn" onclick="clearAll()">🗑 Очистить</button>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <select class="model-select" id="modelSelect" onchange="saveModel()"></select>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </header>

    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome">
        <h1>Где начнём?</h1>
        <p>Выбери модель и задай вопрос</p>
      </div>
      <div class="messages hidden" id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <textarea 
          class="input-box" 
          id="input" 
          placeholder="Напиши сообщение..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" onclick="send()" id="sendBtn">➤</button>
      </div>
    </div>
  </main>
</div>

<script>
const PROXY_URL_KEY = 'chat_proxy_url';
const MODEL_KEY = 'chat_model';
const CHATS_KEY = 'chat_chats';
const THEME_KEY = 'chat_theme';

let chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}');
let currentChatId = null;
let models = [];

// Init
async function init() {
  loadTheme();
  await loadModels();
  loadChatList();
  
  const savedModel = localStorage.getItem(MODEL_KEY);
  if (savedModel && models.find(m => m.id === savedModel)) {
    document.getElementById('modelSelect').value = savedModel;
  }
}

function loadTheme() {
  const theme = localStorage.getItem(THEME_KEY) || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

async function loadModels() {
  const proxyUrl = localStorage.getItem(PROXY_URL_KEY);
  if (!proxyUrl) {
    const url = prompt('Введи URL Cloudflare Worker прокси:');
    if (url) {
      localStorage.setItem(PROXY_URL_KEY, url);
    } else {
      alert('Без прокси не работает. Обнови страницу и введи URL.');
      return;
    }
  }

  try {
    const r = await fetch(`${proxyUrl}/v1/models`);
    const data = await r.json();
    models = (data.models || []).filter(m => m.available !== false);
    
    const select = document.getElementById('modelSelect');
    select.innerHTML = models.map(m => 
      `<option value="${m.id}">${m.label}${m.available === false ? ' ❌' : ''}</option>`
    ).join('');
  } catch (e) {
    alert('Ошибка загрузки моделей: ' + e.message);
  }
}

function saveModel() {
  localStorage.setItem(MODEL_KEY, document.getElementById('modelSelect').value);
}

function loadChatList() {
  const list = document.getElementById('chatList');
  const sorted = Object.entries(chats).sort((a, b) => b[1].updated - a[1].updated);
  
  list.innerHTML = sorted.map(([id, chat]) => 
    `<div class="chat-item ${id === currentChatId ? 'active' : ''}" onclick="loadChat('${id}')">
      ${chat.title || 'Новый чат'}
    </div>`
  ).join('');
}

function newChat() {
  currentChatId = null;
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('messages').classList.add('hidden');
  document.getElementById('messages').innerHTML = '';
  loadChatList();
}

function loadChat(id) {
  currentChatId = id;
  const chat = chats[id];
  if (!chat) return;

  document.getElementById('welcome').classList.add('hidden');
  const messagesDiv = document.getElementById('messages');
  messagesDiv.classList.remove('hidden');
  messagesDiv.innerHTML = chat.messages.map(m => renderMessage(m)).join('');
  
  loadChatList();
  scrollToBottom();
}

function renderMessage(msg) {
  const avatar = msg.role === 'user' ? '👤' : '🤖';
  const name = msg.role === 'user' ? 'Вы' : (msg.model || 'AI');
  const content = msg.role === 'assistant' ? marked.parse(msg.content) : escapeHtml(msg.content);
  
  return `
    <div class="message ${msg.role}">
      <div class="message-header">
        <div class="avatar">${avatar}</div>
        <span>${name}</span>
      </div>
      <div class="message-content">${content}</div>
    </div>
  `;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  const model = document.getElementById('modelSelect').value;
  if (!model) {
    alert('Выбери модель');
    return;
  }

  // Create chat if needed
  if (!currentChatId) {
    currentChatId = 'chat_' + Date.now();
    chats[currentChatId] = {
      title: text.substring(0, 50),
      messages: [],
      updated: Date.now()
    };
  }

  // Add user message
  const userMsg = { role: 'user', content: text, timestamp: Date.now() };
  chats[currentChatId].messages.push(userMsg);
  chats[currentChatId].updated = Date.now();
  saveChats();

  // Render
  document.getElementById('welcome').classList.add('hidden');
  const messagesDiv = document.getElementById('messages');
  messagesDiv.classList.remove('hidden');
  messagesDiv.innerHTML += renderMessage(userMsg);
  
  input.value = '';
  autoResize(input);
  scrollToBottom();

  // Show loading
  const loadingId = 'loading_' + Date.now();
  messagesDiv.innerHTML += `
    <div class="message assistant" id="${loadingId}">
      <div class="message-header">
        <div class="avatar">🤖</div>
        <span>${model}</span>
      </div>
      <div class="message-content"><span class="loading">Думаю</span></div>
    </div>
  `;
  scrollToBottom();

  // Send to API
  try {
    const proxyUrl = localStorage.getItem(PROXY_URL_KEY);
    const r = await fetch(`${proxyUrl}/v1/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        messages: chats[currentChatId].messages.map(m => ({ role: m.role, content: m.content }))
      })
    });

    const data = await r.json();
    
    // Remove loading
    document.getElementById(loadingId).remove();

    if (data.error) {
      throw new Error(data.message || data.error);
    }

    const aiMsg = { 
      role: 'assistant', 
      content: data.text || 'Пустой ответ', 
      model: model,
      timestamp: Date.now() 
    };
    chats[currentChatId].messages.push(aiMsg);
    chats[currentChatId].updated = Date.now();
    saveChats();

    messagesDiv.innerHTML += renderMessage(aiMsg);
    scrollToBottom();
  } catch (e) {
    document.getElementById(loadingId).remove();
    const errorMsg = { role: 'assistant', content: '⚠️ Ошибка: ' + e.message, model: model, timestamp: Date.now() };
    messagesDiv.innerHTML += renderMessage(errorMsg);
    scrollToBottom();
  }

  loadChatList();
}

function saveChats() {
  localStorage.setItem(CHATS_KEY, JSON.stringify(chats));
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function exportChat() {
  if (!currentChatId || !chats[currentChatId]) {
    alert('Нет активного чата');
    return;
  }
  
  const chat = chats[currentChatId];
  let md = `# ${chat.title}\\n\\n`;
  chat.messages.forEach(m => {
    md += `## ${m.role === 'user' ? 'Вы' : m.model || 'AI'}\\n\\n`;
    md += m.content + '\\n\\n';
  });
  
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${chat.title.replace(/[^a-z0-9]/gi, '_')}.md`;
  a.click();
}

function clearAll() {
  if (confirm('Удалить все чаты?')) {
    chats = {};
    localStorage.removeItem(CHATS_KEY);
    newChat();
  }
}

init();
</script>
</body>
</html>
