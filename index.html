<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI Workspace Dual & Multimodal</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .chat-container { height: calc(100vh - 180px); }
    .markdown-body pre { background: #1f2937; padding: 1rem; border-radius: 0.5rem; color: #fff; overflow-x: auto; margin: 0.5rem 0; }
    .markdown-body code { font-family: monospace; background: #e5e7eb; padding: 0.2rem 0.4rem; border-radius: 0.25rem; color: #b91c1c; }
    .markdown-body pre code { color: #fff; background: transparent; padding: 0; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

  <!-- Шапка -->
  <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
      <h1 class="text-xl font-bold text-blue-400 flex items-center gap-2">🚀 AI Hub <span class="text-xs text-gray-400">v2.0</span></h1>
      
      <!-- Панель управления моделями -->
      <div class="flex items-center flex-wrap gap-4">
        <!-- Режим сравнения -->
        <label class="flex items-center gap-2 bg-gray-700 px-3 py-1.5 rounded-lg cursor-pointer hover:bg-gray-600 transition">
          <input type="checkbox" id="compareMode" class="form-checkbox text-blue-500 rounded">
          <span class="text-sm font-medium">🌓 Режим сравнения</span>
        </label>

        <!-- Модель 1 -->
        <div class="flex flex-col">
          <span class="text-xs text-gray-400 font-bold mb-0.5">Модель 1 (Основная)</span>
          <select id="modelSelect1" class="bg-gray-700 text-sm rounded-lg p-2 border border-gray-600 focus:outline-none focus:border-blue-500 w-64"></select>
        </div>

        <!-- Модель 2 (Скрыта по умолчанию) -->
        <div id="model2Wrapper" class="flex flex-col hidden">
          <span class="text-xs text-gray-400 font-bold mb-0.5">Модель 2</span>
          <select id="modelSelect2" class="bg-gray-700 text-sm rounded-lg p-2 border border-gray-600 focus:outline-none focus:border-green-500 w-64"></select>
        </div>
      </div>
    </div>
  </header>

  <!-- Окно чата -->
  <main class="max-w-7xl mx-auto p-4">
    <div id="chatWindow" class="chat-container overflow-y-auto space-y-4 pr-2 flex gap-4 items-start">
      <!-- Контейнер для Одиночного режима -->
      <div id="singleTrack" class="w-full space-y-4"></div>
      
      <!-- Контейнеры для Режима сравнения -->
      <div id="compareTrack1" class="w-1/2 space-y-4 hidden border-r border-gray-800 pr-4">
        <div class="text-center text-xs font-bold text-blue-400 tracking-wider uppercase border-b border-gray-800 pb-2 mb-2">Ответ модели 1</div>
      </div>
      <div id="compareTrack2" class="w-1/2 space-y-4 hidden pl-2">
        <div class="text-center text-xs font-bold text-green-400 tracking-wider uppercase border-b border-gray-800 pb-2 mb-2">Ответ модели 2</div>
      </div>
    </div>
  </main>

  <!-- Фиксированная нижняя панель ввода -->
  <footer class="fixed bottom-0 left-0 w-full bg-gray-800 border-t border-gray-700 p-4">
    <div class="max-w-4xl mx-auto">
      <!-- Список прикрепленных файлов -->
      <div id="filePreviewContainer" class="flex flex-wrap gap-2 mb-2"></div>

      <div class="flex items-center gap-2">
        <!-- Кнопка прикрепления файла -->
        <label class="bg-gray-700 hover:bg-gray-600 text-gray-200 p-3 rounded-xl cursor-pointer transition flex items-center justify-center shadow" title="Прикрепить файл (Картинка, PDF, Текст)">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
          </svg>
          <input type="file" id="fileInput" class="hidden" multiple>
        </label>

        <!-- Поле ввода текста -->
        <textarea id="promptInput" rows="1" class="flex-1 bg-gray-700 text-gray-100 rounded-xl p-3 border border-gray-600 focus:outline-none focus:border-blue-500 resize-none shadow placeholder-gray-400" placeholder="Напишите запрос... (Gemini Flash поддерживает файлы)"></textarea>

        <!-- Кнопка отправки -->
        <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-3 rounded-xl transition shadow flex items-center justify-center">
          Отправить
        </button>
      </div>
    </div>
  </footer>

  <script>
    // === ВСТАВЬ СЮДА СВОЙ URL ПОЛУЧЕННЫЙ ИЗ CLOUDFLARE ===
    const WORKER_URL = 'https://chat-ai-proxy.zenitogk.workers.dev';

    let attachedFiles = [];
    let chatHistory = [];

    const compareModeCheck = document.getElementById('compareMode');
    const model2Wrapper = document.getElementById('model2Wrapper');
    const singleTrack = document.getElementById('singleTrack');
    const compareTrack1 = document.getElementById('compareTrack1');
    const compareTrack2 = document.getElementById('compareTrack2');
    const modelSelect1 = document.getElementById('modelSelect1');
    const modelSelect2 = document.getElementById('modelSelect2');
    const fileInput = document.getElementById('fileInput');
    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatWindow = document.getElementById('chatWindow');

    // Переключение режимов работы (Одиночный / Сравнение)
    compareModeCheck.addEventListener('change', (e) => {
      if (e.target.checked) {
        model2Wrapper.classList.remove('hidden');
        singleTrack.classList.add('hidden');
        compareTrack1.classList.remove('hidden');
        compareTrack2.classList.remove('hidden');
      } else {
        model2Wrapper.classList.add('hidden');
        singleTrack.classList.remove('hidden');
        compareTrack1.classList.add('hidden');
        compareTrack2.classList.add('hidden');
      }
      chatWindow.innerHTML = e.target.checked ? '' : '';
      if(e.target.checked) {
        chatWindow.appendChild(compareTrack1);
        chatWindow.appendChild(compareTrack2);
      } else {
        chatWindow.appendChild(singleTrack);
      }
    });

    // Загрузка доступных моделей с воркера
    async function loadModels() {
      try {
        const res = await fetch(`${WORKER_URL}/v1/models`);
        const data = await res.json();
        
        [modelSelect1, modelSelect2].forEach(select => {
          select.innerHTML = '';
          data.models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.label;
            select.appendChild(opt);
          });
        });
        if(modelSelect2.options.length > 1) modelSelect2.selectedIndex = 1;
      } catch (e) {
        alert('Ошибка подключения к воркеру. Проверьте правильность WORKER_URL.');
      }
    }

    // Обработка выбора файлов
    fileInput.addEventListener('change', async (e) => {
      for (let file of e.target.files) {
        const base64Data = await convertToBase64(file);
        const fileObj = {
          name: file.name,
          type: file.type,
          base64: base64Data.split(',')[1] // чистый base64 без заголовка
        };
        attachedFiles.push(fileObj);
        renderFilePreviews();
      }
      fileInput.value = '';
    });

    function convertToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    function renderFilePreviews() {
      filePreviewContainer.innerHTML = '';
      attachedFiles.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = 'bg-gray-700 text-xs text-gray-200 px-3 py-1.5 rounded-lg flex items-center gap-2 border border-gray-600 animate-fade-in';
        div.innerHTML = `
          <span class="truncate max-w-xs">📎 ${file.name}</span>
          <button onclick="removeFile(${index})" class="text-red-400 hover:text-red-300 font-bold ml-1">×</button>
        `;
        filePreviewContainer.appendChild(div);
      });
    }

    window.removeFile = function(index) {
      attachedFiles.splice(index, 1);
      renderFilePreviews();
    }

    // Отправка сообщений
    sendBtn.addEventListener('click', async () => {
      const text = promptInput.value.trim();
      if (!text && attachedFiles.length === 0) return;

      promptInput.value = '';
      promptInput.style.height = 'auto';

      // Собираем части сообщения (текст + прикрепленные файлы)
      const parts = [];
      if (text) parts.push({ text: text });
      attachedFiles.forEach(f => {
        parts.push({ inlineData: { mimeType: f.type, data: f.base64 } });
      });

      const userMessage = { role: 'user', parts: parts, content: text };
      chatHistory.push(userMessage);

      // Отображаем запрос пользователя на экране
      renderUserMessage(text, [...attachedFiles]);
      attachedFiles = [];
      renderFilePreviews();

      if (compareModeCheck.checked) {
        // Запускаем два независимых параллельных запроса в режиме сравнения
        sendToModel(modelSelect1.value, compareTrack1, 'blue');
        sendToModel(modelSelect2.value, compareTrack2, 'green');
      } else {
        // Одиночный режим
        sendToModel(modelSelect1.value, singleTrack, 'blue');
      }
    });

    function renderUserMessage(text, files) {
      const fileNames = files.map(f => `<span class="text-blue-400 block text-xs">📎 Файл: ${f.name}</span>`).join('');
      const htmlContent = `
        <div class="flex justify-end mb-4 animate-fade-in">
          <div class="bg-blue-900 border border-blue-700 rounded-2xl px-4 py-3 max-w-3xl shadow">
            <div class="text-xs text-blue-300 font-bold mb-1">Вы:</div>
            <div class="whitespace-pre-wrap">${text || '(Отправлен файл)'}</div>
            ${fileNames}
          </div>
        </div>`;
      
      if (compareModeCheck.checked) {
        compareTrack1.insertAdjacentHTML('beforeend', htmlContent);
        compareTrack2.insertAdjacentHTML('beforeend', htmlContent);
      } else {
        singleTrack.insertAdjacentHTML('beforeend', htmlContent);
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendToModel(modelId, targetTrack, colorClass) {
      // Создаем блок заглушки ожидания ответа
      const blockId = 'ai-' + Math.random().toString(36).substr(2, 9);
      const borderColors = colorClass === 'blue' ? 'border-blue-500' : 'border-green-500';
      const textColors = colorClass === 'blue' ? 'text-blue-400' : 'text-green-400';
      
      const aiBlockHtml = `
        <div id="${blockId}" class="flex justify-start mb-4">
          <div class="bg-gray-800 border-l-4 ${borderColors} rounded-xl px-4 py-3 w-full shadow markdown-body">
            <div class="text-xs ${textColors} font-bold mb-1">${modelId}:</div>
            <div class="loading text-sm text-gray-400 animate-pulse">Думает...</div>
          </div>
        </div>`;
      targetTrack.insertAdjacentHTML('beforeend', aiBlockHtml);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      try {
        const res = await fetch(`${WORKER_URL}/v1/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: modelId, messages: chatHistory })
        });
        const data = await res.json();
        
        const container = document.getElementById(blockId).querySelector('.markdown-body');
        container.querySelector('.loading').remove();
        
        if (data.error) {
          container.insertAdjacentHTML('beforeend', `<div class="text-red-400 font-medium">⚠️ Ошибка: ${data.error}</div>`);
        } else {
          container.insertAdjacentHTML('beforeend', `<div>${marked.parse(data.text)}</div>`);
          // В историю чата пишем только ответы основной модели, чтобы не путать контекст
          if (!compareModeCheck.checked || targetTrack === compareTrack1) {
            chatHistory.push({ role: 'assistant', content: data.text });
          }
        }
      } catch (e) {
        const container = document.getElementById(blockId).querySelector('.markdown-body');
        container.querySelector('.loading').remove();
        container.insertAdjacentHTML('beforeend', `<div class="text-red-400 font-medium">⚠️ Сетевая ошибка обращения к воркеру</div>`);
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Автовыравнивание высоты textarea под текст
    promptInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    // Инициализация при запуске страницы
    loadModels();
  </script>
</body>
</html>
